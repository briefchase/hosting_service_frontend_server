<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <script>
        // Set page title to hostname only (no protocol)
        (function(){
            try { document.title = window.location.hostname; } catch(e) {}
        })();
    </script>
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="/css/style.css"> <!-- Optional: Add a CSS file -->
    <meta name="theme-color" content="#000"/>
    <!-- Favicons -->
    <link rel="icon" type="image/png" href="/images/icon-grey.png"> <!-- Safe Fallback -->
    <link rel="icon" type="image/png" href="/images/icon-grey.png" media="(prefers-color-scheme: light)">
    <link rel="icon" type="image/png" href="/images/icon-white.png" media="(prefers-color-scheme: dark)">
    <link rel="apple-touch-icon" href="/images/icon-grey.png">
    
    <meta name="description" content="A simple, clean console interface for web services.">
    <!-- Stripe.js -->
    <script src="https://js.stripe.com/v3/"></script>
    <!-- Google Platform Library -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="main-app">
    <div id="console-container">
        <div id="header-container">
            <div id="site-title"></div>
            <!-- Add static buttons, initially hidden -->
            <span id="back-button" class="back-button" style="display: none;">&lt; back</span>
            <span id="account-button" class="account-button" style="display: none;"></span>
        </div>
        <div id="hosting-tagline">We host websites</div>
        <!-- Content (landing or menu) will be loaded here -->
        <div id="landing-view-container">
            <div id="console-button" class="landing-option">continue</div>
        </div>

        <!-- Spotify embed is now part of the main content flow -->
        <div id="spotify-embed-wrapper" style="display: none;">
            <iframe id="global-spotify-embed" data-testid="embed-iframe" src="https://open.spotify.com/embed/playlist/7LDlK4VLv2RNxaQ7Z4D6qI?utm_source=generator" frameBorder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        </div>

        <div class="footer-container">
            <div class="legal-links">
                <a href="https://briefchase.com" target="_blank" rel="noopener">© <span id="legal-year"></span> Briefchase LLC</a>&nbsp;
                <a href="/templates/privacy.html">Privacy Policy</a>&nbsp;
                <a href="/templates/tos.html">Terms of Service</a>&nbsp;
                <a href="https://github.com/briefchase/hosting_service_frontend_server" target="_blank" rel="noopener">Code</a>&nbsp;
                <a href="https://www.instagram.com/servercult/" target="_blank" rel="noopener" aria-label="Instagram">
                    <img src="/images/instagram.svg" alt="Instagram" class="social-icon">
                </a>
            </div>
            <div class="support-container">
                <div class="support-text">Open 24 Hours</div>
                <div class="support-number">
                    <span class="rainbow-text">(305) 501-0383</span>
                </div>
            </div>
        </div>

        <!-- Pre-rendered mode toggle button -->
        <div id="mode-toggle-container" style="display: none;">
            <img id="mode-toggle-cat" src="/images/cat-illustration.gif" alt="Enter Cat Mode" style="display: none; width: 70px; height: 70px; cursor: pointer;">
            <img id="mode-toggle-serious" src="/images/briefcase.gif" alt="Enter Serious Mode" style="display: none; width: 80px; height: 80px; cursor: pointer;">
        </div>
    </div>

    <!-- prompt container is created dynamically by prompt.js -->

    <script type="module" src="/js/main.js"></script> <!-- Link the main index script as a module -->

</body>
</html>
